name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, lint e testes com cobertura
        env:
          # env.ts exige JWT_*; não há .env no CI (gitignore). jest-ci-env.js também preenche quando CI=true.
          JWT_SECRET: ffffffffffffffffffffffffffffffff
          JWT_ACCESS_SECRET: ffffffffffffffffffffffffffffffff
          JWT_REFRESH_SECRET: ffffffffffffffffffffffffffffffff
        run: npm run check

      - name: Build e verificação do dist (entrypoint + Swagger)
        env:
          JWT_SECRET: ffffffffffffffffffffffffffffffff
          JWT_ACCESS_SECRET: ffffffffffffffffffffffffffffffff
          JWT_REFRESH_SECRET: ffffffffffffffffffffffffffffffff
        run: npm run build && npm run verify:dist

      - name: Smoke HTTP — servidor sobe e /health responde
        env:
          JWT_SECRET: ffffffffffffffffffffffffffffffff
          JWT_ACCESS_SECRET: ffffffffffffffffffffffffffffffff
          JWT_REFRESH_SECRET: ffffffffffffffffffffffffffffffff
          NODE_ENV: test
          SMOKE_PORT: "34581"
        run: npm run smoke:http

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=40s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Migrations e seeders contra MySQL
        env:
          DB_DIALECT: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_DATABASE: db_app
          DB_USERNAME: root
          DB_PASSWORD: root
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: ci_bootstrap_admin_password_not_for_prod
        run: npm run db:bootstrap
