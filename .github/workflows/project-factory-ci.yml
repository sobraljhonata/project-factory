name: project-factory CI

on:
  push:
    paths:
      - "project-factory/**"
      - ".github/workflows/project-factory-ci.yml"
  pull_request:
    paths:
      - "project-factory/**"
      - ".github/workflows/project-factory-ci.yml"

defaults:
  run:
    working-directory: project-factory

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: project-factory/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: CLI unit tests
        run: npm run test:cli

      - name: Smoke test (generate + check + HTTP)
        run: npm run smoke
