name: project-factory CI

on:
  push:
    paths:
      - "templates/**"
      - "cli/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/project-factory-ci.yml"
  pull_request:
    paths:
      - "templates/**"
      - "cli/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/project-factory-ci.yml"

defaults:
  run:
    working-directory: .

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: CLI unit tests
        run: npm run test:cli

      - name: Smoke test (generate + check + HTTP)
        run: npm run smoke

  terraform-templates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Terraform fmt + validate (templates via projeto gerado)
        run: npm run check:terraform
